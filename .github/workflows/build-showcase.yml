name: Build Showcase

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/routes/showcase/**'
      - 'frontend/src/lib/showcase/**'
      - 'frontend/src/lib/components/StoreView.svelte'
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static showcase
        working-directory: frontend
        run: npm run build

      - name: Extract showcase files
        run: |
          mkdir -p showcase-output
          # 保持 _app/ 与 showcase/ 同级，匹配 SvelteKit 相对路径引用
          cp -r frontend/build/showcase showcase-output/showcase
          cp -r frontend/build/_app showcase-output/_app

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: showcase-static
          path: showcase-output
          retention-days: 30

      - name: Dispatch showcase-ready event
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PRESTO_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Presto-io/Presto-Homepage/dispatches \
            -d '{"event_type":"showcase-ready"}'
