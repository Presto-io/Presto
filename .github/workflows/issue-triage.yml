name: Issue Triage

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to triage
        required: true
        type: number
      dry_run:
        description: Preview labels without applying them
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-triage-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  label:
    name: Infer issue labels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Ensure triage labels exist
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/triage-issue.cjs --ensure-labels-only

      - name: Apply inferred labels
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          DRY_RUN: ${{ inputs.dry_run || false }}
        run: node .github/scripts/triage-issue.cjs
