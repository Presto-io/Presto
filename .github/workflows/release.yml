name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'
  TYPST_VERSION: '0.14.2'

jobs:
  # ── Frontend: build once, share across platforms ──────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Embed into desktop build dir
        run: cp -r frontend/build/* cmd/presto-desktop/build/

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: cmd/presto-desktop/build/
          retention-days: 1

  # ── macOS: arm64 + amd64 ─────────────────────────────────
  build-macos:
    needs: build-frontend
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm64
            make_target: dist-dmg-arm64
          - goarch: amd64
            make_target: dist-dmg-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: cmd/presto-desktop/build/

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build DMG
        run: make ${{ matrix.make_target }} VERSION=${{ env.VERSION }} SKIP_FRONTEND=1

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos-${{ matrix.goarch }}
          path: dist/Presto-${{ env.VERSION }}-macOS-${{ matrix.goarch }}.dmg

  # ── Windows: amd64 + arm64 ─────────────────────────────────
  build-windows:
    needs: build-frontend
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            cc: gcc
            typst_archive: typst-x86_64-pc-windows-msvc.zip
          - goarch: arm64
            cc: aarch64-w64-mingw32-gcc
            typst_archive: typst-aarch64-pc-windows-msvc.zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: cmd/presto-desktop/build/

      - name: Add MSYS2 MinGW to PATH
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"

      - name: Setup llvm-mingw for arm64 cross-compilation
        if: matrix.goarch == 'arm64'
        run: |
          LLVM_MINGW_URL="https://github.com/mstorsjo/llvm-mingw/releases/download/20250114/llvm-mingw-20250114-ucrt-x86_64.zip"
          curl -sL "$LLVM_MINGW_URL" -o llvm-mingw.zip
          # SEC-23: Verify integrity of cross-compilation toolchain
          # Update this hash when upgrading llvm-mingw version
          EXPECTED_HASH="9395d95c089611e6cd728c9a07219ffc5ac706e0c719833a2f7e64a706a81541"
          echo "${EXPECTED_HASH}  llvm-mingw.zip" | sha256sum -c - || {
            echo "ERROR: llvm-mingw checksum verification failed!"
            echo "If upgrading the version, update the EXPECTED_HASH in this workflow."
            exit 1
          }
          unzip -q llvm-mingw.zip
          echo "$PWD/llvm-mingw-20250114-ucrt-x86_64/bin" >> "$GITHUB_PATH"

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build Windows binary
        env:
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -tags "desktop,production" \
            -ldflags "-s -w -X main.version=${{ env.VERSION }} -H windowsgui" \
            -o "dist/Presto.exe" \
            ./cmd/presto-desktop/

      - name: Download typst
        run: |
          curl -sL "https://github.com/typst/typst/releases/download/v${{ env.TYPST_VERSION }}/${{ matrix.typst_archive }}" -o typst.zip
          unzip -qo typst.zip -d typst-tmp
          find typst-tmp -name 'typst.exe' | head -1 | xargs -I{} cp {} dist/typst.exe

      - name: Package
        run: |
          cd dist
          7z a "Presto-${{ env.VERSION }}-windows-${{ matrix.goarch }}.zip" Presto.exe typst.exe

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows-${{ matrix.goarch }}
          path: dist/Presto-${{ env.VERSION }}-windows-${{ matrix.goarch }}.zip

  # ── Linux: amd64 + arm64 ───────────────────────────────────
  build-linux:
    needs: build-frontend
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            cc: gcc
            typst_archive: typst-x86_64-unknown-linux-musl.tar.xz
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
            typst_archive: typst-aarch64-unknown-linux-musl.tar.xz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: cmd/presto-desktop/build/

      - name: Install native dependencies (amd64)
        if: matrix.goarch == 'amd64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: Setup arm64 cross-compilation
        if: matrix.goarch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          # Replace ALL apt sources with arch-pinned versions
          sudo rm -f /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources
          sudo tee /etc/apt/sources.list <<'SOURCES'
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
          deb [arch=amd64] http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
          SOURCES
          sudo sed -i 's/^          //' /etc/apt/sources.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu pkg-config \
            libgtk-3-dev:arm64 libwebkit2gtk-4.0-dev:arm64

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build Linux binary
        run: |
          export CGO_ENABLED=1
          export CC=${{ matrix.cc }}
          export GOOS=linux
          export GOARCH=${{ matrix.goarch }}
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          fi
          go build \
            -tags "desktop,production" \
            -ldflags "-s -w -X main.version=${{ env.VERSION }}" \
            -o "dist/Presto" \
            ./cmd/presto-desktop/

      - name: Download typst
        run: make _download-typst TYPST_ARCHIVE=${{ matrix.typst_archive }} TYPST_OUT=dist/typst

      - name: Package
        run: |
          cd dist
          tar czf "Presto-${{ env.VERSION }}-linux-${{ matrix.goarch }}.tar.gz" Presto typst

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-${{ matrix.goarch }}
          path: dist/Presto-${{ env.VERSION }}-linux-${{ matrix.goarch }}.tar.gz

  # ── Docker: multi-arch server image ─────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/presto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release ──────────────────────────────────────────
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: dist-*
          merge-multiple: true

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum Presto-* > checksums.txt

      - name: Upload to Release
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release upload "${{ github.ref_name }}" dist/* --clobber
          else
            gh release create "${{ github.ref_name }}" \
              --title "Presto ${{ env.VERSION }}" \
              --generate-notes \
              dist/*
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Homebrew Cask: 推送到 brewforge/chinese ────────────────
  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download DMGs from release
        run: |
          curl -sL -o "Presto-arm64.dmg" \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Presto-${{ env.VERSION }}-macOS-arm64.dmg"
          curl -sL -o "Presto-amd64.dmg" \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Presto-${{ env.VERSION }}-macOS-amd64.dmg"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate SHA256
        run: |
          echo "SHA256_ARM64=$(sha256sum Presto-arm64.dmg | cut -d ' ' -f 1)" >> "$GITHUB_ENV"
          echo "SHA256_AMD64=$(sha256sum Presto-amd64.dmg | cut -d ' ' -f 1)" >> "$GITHUB_ENV"

      - name: Clone Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: brewforge/homebrew-more
          path: homebrew-more
          # SEC-24: BREWFORGE_PAT minimum required scope: repo (for push + PR creation)
          # Audit this PAT periodically. Consider using a GitHub App token for tighter scope.
          token: ${{ secrets.BREWFORGE_PAT }}

      - name: Generate Cask file
        run: |
          mkdir -p homebrew-more/Casks
          cat > homebrew-more/Casks/presto.rb << 'CASK'
          cask "presto" do
            version "VERSION_PLACEHOLDER"

            on_arm do
              sha256 "SHA256_ARM64_PLACEHOLDER"
              url "https://github.com/Presto-io/Presto/releases/download/v#{version}/Presto-#{version}-macOS-arm64.dmg"
            end

            on_intel do
              sha256 "SHA256_AMD64_PLACEHOLDER"
              url "https://github.com/Presto-io/Presto/releases/download/v#{version}/Presto-#{version}-macOS-amd64.dmg"
            end

            name "Presto"
            desc "Typst-based document editor for Chinese government and education"
            homepage "https://github.com/Presto-io/Presto"

            depends_on macos: ">= :big_sur"

            app "Presto.app"
          end
          CASK
          sed -i "s/VERSION_PLACEHOLDER/${{ env.VERSION }}/" homebrew-more/Casks/presto.rb
          sed -i "s/SHA256_ARM64_PLACEHOLDER/${{ env.SHA256_ARM64 }}/" homebrew-more/Casks/presto.rb
          sed -i "s/SHA256_AMD64_PLACEHOLDER/${{ env.SHA256_AMD64 }}/" homebrew-more/Casks/presto.rb
          sed -i 's/^          //' homebrew-more/Casks/presto.rb

      - name: Create Pull Request
        run: |
          cd homebrew-more
          git config user.name github-actions
          git config user.email "${{ secrets.COMMIT_EMAIL }}"
          git add Casks/presto.rb
          git commit -m "presto ${{ env.VERSION }}"
          git push origin HEAD:presto-${{ github.ref_name }}
          gh pr create \
            --title "presto ${{ env.VERSION }}" \
            --body "更新 Presto Cask 到版本 ${{ env.VERSION }}" \
            --base main \
            --head presto-${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.BREWFORGE_PAT }}
