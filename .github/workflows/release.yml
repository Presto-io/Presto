name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.26.3'
  NODE_VERSION: '22'
  TYPST_VERSION: '0.14.2'
  TINYMIST_VERSION: '0.14.18'

jobs:
  verify-tag-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Verify tag is on main lineage
        run: |
          if [[ "${{ github.event_name }}" != "push" ]] || [[ ! "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            echo "Not a tag push, skipping lineage verification."
            exit 0
          fi

          if ! git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main; then
            echo "::error::Failed to refresh origin/main for release tag lineage verification."
            exit 1
          fi

          TAG_COMMIT="$(git rev-parse "${GITHUB_REF}^{commit}")"
          MAIN_COMMIT="$(git rev-parse refs/remotes/origin/main)"
          echo "Resolved release tag ${GITHUB_REF_NAME} to commit ${TAG_COMMIT}"
          echo "origin/main currently points to ${MAIN_COMMIT}"

          if git merge-base --is-ancestor "$TAG_COMMIT" refs/remotes/origin/main; then
            echo "Lineage check result: tag commit is reachable from origin/main."
            echo "Tag commit is on origin/main lineage."
            exit 0
          fi

          echo "Lineage check result: tag commit is NOT reachable from origin/main."

          echo "::error::Release tag ${GITHUB_REF_NAME} does not belong to origin/main lineage."
          echo "::error::Create release tags from main to keep git describe / changelog history correct."
          exit 1

  # ── Frontend: build once, share across platforms ──────────
  build-frontend:
    needs: verify-tag-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Embed into desktop build dir
        run: cp -r frontend/build/* cmd/presto-desktop/build/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-build
          path: cmd/presto-desktop/build/
          retention-days: 1

      - name: Build portable frontend
        run: cd frontend && VITE_PRESTO_CHANNEL=portable npm run build

      - name: Embed portable frontend into desktop build dir
        run: |
          rm -rf cmd/presto-desktop/build/*
          cp -r frontend/build/* cmd/presto-desktop/build/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-build-portable
          path: cmd/presto-desktop/build/
          retention-days: 1

  # ── macOS: arm64 + amd64 ─────────────────────────────────
  build-macos:
    needs: build-frontend
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm64
            make_target: dist-dmg-arm64
          - goarch: amd64
            make_target: dist-dmg-amd64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare portable template registry snapshot
        run: |
          git clone --depth=1 https://github.com/Presto-io/template-registry.git ../template-registry
          test -f ../template-registry/registry.json
          test -f ../template-registry/templates/gongwen/manifest.json
          test -f ../template-registry/templates/jiaoan-shicao/manifest.json
          test -f ../template-registry/templates/jiaoan-jihua/manifest.json

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-build
          path: cmd/presto-desktop/build/

      - name: Import code signing certificate
        if: ${{ env.APPLE_CERTIFICATE_P12_BASE64 != '' }}
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f "$RUNNER_TEMP/certificate.p12"

          # Set keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Export identity for make
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "==> Certificate imported: $IDENTITY"

      - name: Warn if signing secrets not configured
        if: ${{ env.APPLE_CERTIFICATE_P12_BASE64 == '' }}
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
        run: echo "::warning::Code signing secrets not configured. Building with ad-hoc signature."

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build DMG
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        run: make ${{ matrix.make_target }} VERSION=${{ env.VERSION }} SKIP_FRONTEND=1

      - name: Notarize DMG
        if: ${{ env.CODESIGN_IDENTITY != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          DMG_FILE="dist/Presto-${{ env.VERSION }}-macOS-${{ matrix.goarch }}.dmg"
          make notarize DMG_PATH="$DMG_FILE"

      - name: Clear embedded frontend for portable build
        run: rm -rf cmd/presto-desktop/build/*

      - name: Download portable frontend
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-build-portable
          path: cmd/presto-desktop/build/

      - name: Build portable DMG
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        run: make dist-dmg-portable-${{ matrix.goarch }} VERSION=${{ env.VERSION }} SKIP_FRONTEND=1

      - name: Notarize portable DMG
        if: ${{ env.CODESIGN_IDENTITY != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          DMG_FILE="dist/Presto-${{ env.VERSION }}-portable-macOS-${{ matrix.goarch }}.dmg"
          make notarize DMG_PATH="$DMG_FILE"

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-macos-${{ matrix.goarch }}
          path: |
            dist/Presto-${{ env.VERSION }}-macOS-${{ matrix.goarch }}.dmg
            dist/Presto-${{ env.VERSION }}-portable-macOS-${{ matrix.goarch }}.dmg

  # ── Windows: amd64 + arm64 ─────────────────────────────────
  build-windows:
    needs: build-frontend
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            cc: gcc
            typst_archive: typst-x86_64-pc-windows-msvc.zip
            typst_sha256: "51353994ac83218c3497052e89b2c432c53b9d4439cdc1b361e2ea4798ebfc13"
            tinymist_archive: tinymist-x86_64-pc-windows-msvc.zip
            tinymist_sha256: "2c6433ce8fc5126252d5c78db3e2886d089cec7ccc5ed32f12c7b1847b534a34"
            vc_redist_url: https://aka.ms/vc14/vc_redist.x64.exe
          - goarch: arm64
            cc: aarch64-w64-mingw32-gcc
            typst_archive: typst-aarch64-pc-windows-msvc.zip
            typst_sha256: "1c4aaa0de000ab1787dda354c34f4fa1fe3c2525d3d038e692a3d7daa333d551"
            tinymist_archive: tinymist-aarch64-pc-windows-msvc.zip
            tinymist_sha256: "4a302734a2a6d6c4911404ca0c62f97ace706ebc62666b18090bc36031baaaa4"
            vc_redist_url: https://aka.ms/vc14/vc_redist.arm64.exe
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare portable template registry snapshot
        if: matrix.goarch == 'amd64'
        run: |
          git clone --depth=1 https://github.com/Presto-io/template-registry.git ../template-registry
          test -f ../template-registry/registry.json
          test -f ../template-registry/templates/gongwen/manifest.json
          test -f ../template-registry/templates/jiaoan-shicao/manifest.json
          test -f ../template-registry/templates/jiaoan-jihua/manifest.json

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-build
          path: cmd/presto-desktop/build/

      - name: Add MSYS2 MinGW to PATH
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress
          "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare Inno Setup Simplified Chinese locale
        shell: powershell
        run: |
          $langDir = "build/windows/installer/languages"
          $langPath = Join-Path $langDir "ChineseSimplified.isl"
          $langUrl = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          $expectedHash = "7d544b9bb1d142cfa11f2e5d3cc8abe2e55f8e066c5124e3772675aa236e1278"

          New-Item -ItemType Directory -Force -Path $langDir | Out-Null
          Invoke-WebRequest -Uri $langUrl -OutFile $langPath

          $actualHash = (Get-FileHash $langPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "ChineseSimplified.isl SHA256 mismatch: expected $expectedHash, got $actualHash"
          }

      - name: Cache llvm-mingw toolchain
        if: matrix.goarch == 'arm64'
        id: cache-llvm-mingw
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: llvm-mingw-20250114-ucrt-x86_64
          key: llvm-mingw-20250114-ucrt-x86_64

      - name: Setup llvm-mingw for arm64 cross-compilation
        if: matrix.goarch == 'arm64' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          LLVM_MINGW_URL="https://github.com/mstorsjo/llvm-mingw/releases/download/20250114/llvm-mingw-20250114-ucrt-x86_64.zip"
          curl -sL "$LLVM_MINGW_URL" -o llvm-mingw.zip
          # SEC-23: Verify integrity of cross-compilation toolchain
          # Update this hash when upgrading llvm-mingw version
          EXPECTED_HASH="9395d95c089611e6cd728c9a07219ffc5ac706e0c719833a2f7e64a706a81541"
          echo "${EXPECTED_HASH}  llvm-mingw.zip" | sha256sum -c - || {
            echo "ERROR: llvm-mingw checksum verification failed!"
            echo "If upgrading the version, update the EXPECTED_HASH in this workflow."
            exit 1
          }
          unzip -q llvm-mingw.zip
          rm llvm-mingw.zip

      - name: Add llvm-mingw to PATH
        if: matrix.goarch == 'arm64'
        run: echo "$PWD/llvm-mingw-20250114-ucrt-x86_64/bin" >> "$GITHUB_PATH"

      - name: Extract version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_VERSION="${VERSION%%-*}"
          FILE_VERSION="$(awk -F. '{printf "%d.%d.%d.0", $1, $2, $3}' <<< "$BASE_VERSION")"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "FILE_VERSION=${FILE_VERSION}" >> "$GITHUB_ENV"

      - name: Generate Windows resources (icon + version info)
        working-directory: cmd/presto-desktop
        run: go run github.com/tc-hib/go-winres@latest make --in winres.json

      - name: Build Windows binary
        env:
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -tags "desktop,production" \
            -ldflags "-s -w -X main.version=${VERSION} -H windowsgui" \
            -o "dist/Presto.exe" \
            ./cmd/presto-desktop/

      - name: Download typst
        run: |
          curl -sL "https://github.com/typst/typst/releases/download/v${{ env.TYPST_VERSION }}/${{ matrix.typst_archive }}" -o typst.zip
          # SEC-31: Verify typst binary integrity
          EXPECTED_HASH="${{ matrix.typst_sha256 }}"
          echo "${EXPECTED_HASH}  typst.zip" | sha256sum -c - || {
            echo "ERROR: typst checksum verification failed!"
            echo "If upgrading the version, update the typst_sha256 in the matrix."
            exit 1
          }
          unzip -qo typst.zip -d typst-tmp
          find typst-tmp -name 'typst.exe' | head -1 | xargs -I{} cp {} dist/typst.exe

      - name: Download tinymist
        run: |
          curl -sL "https://github.com/Myriad-Dreamin/tinymist/releases/download/v${{ env.TINYMIST_VERSION }}/${{ matrix.tinymist_archive }}" -o tinymist.zip
          EXPECTED_HASH="${{ matrix.tinymist_sha256 }}"
          echo "${EXPECTED_HASH}  tinymist.zip" | sha256sum -c - || {
            echo "ERROR: tinymist checksum verification failed!"
            echo "If upgrading the version, update the tinymist_sha256 in the matrix."
            exit 1
          }
          unzip -qo tinymist.zip -d tinymist-tmp
          find tinymist-tmp -name 'tinymist.exe' | head -1 | xargs -I{} cp {} dist/tinymist.exe

      - name: Download Visual C++ Redistributable
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "${{ matrix.vc_redist_url }}" -OutFile "dist/vc_redist.exe"

      - name: Package Inno Setup installer
        shell: powershell
        run: |
          $binaryPath = (Resolve-Path "dist/Presto.exe").Path
          $typstPath = (Resolve-Path "dist/typst.exe").Path
          $tinymistPath = (Resolve-Path "dist/tinymist.exe").Path
          $vcRedistPath = (Resolve-Path "dist/vc_redist.exe").Path
          $outputDir = (Resolve-Path "dist").Path
          $outputBaseName = "Presto-${env:VERSION}-windows-${{ matrix.goarch }}-installer"

          & ISCC.exe `
            "/DARG_VERSION=""${env:VERSION}""" `
            "/DARG_FILE_VERSION=""${env:FILE_VERSION}""" `
            "/DARG_ARCH=""${{ matrix.goarch }}""" `
            "/DARG_BINARY=""$binaryPath""" `
            "/DARG_TYPST_BINARY=""$typstPath""" `
            "/DARG_TINYMIST_BINARY=""$tinymistPath""" `
            "/DARG_VC_REDIST=""$vcRedistPath""" `
            "/DARG_OUTPUT_DIR=""$outputDir""" `
            "/DARG_OUTPUT_BASENAME=""$outputBaseName""" `
            "build/windows/installer/presto.iss"

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Clear embedded frontend for portable build
        if: matrix.goarch == 'amd64'
        run: rm -rf cmd/presto-desktop/build/*

      - name: Download portable frontend
        if: matrix.goarch == 'amd64'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-build-portable
          path: cmd/presto-desktop/build/

      - name: Build portable Windows fallback bundle
        if: matrix.goarch == 'amd64'
        run: make dist-windows-portable-amd64 VERSION=${{ env.VERSION }} SKIP_FRONTEND=1

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-windows-${{ matrix.goarch }}
          path: dist/*-windows-${{ matrix.goarch }}-installer.exe

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: matrix.goarch == 'amd64'
        with:
          name: dist-windows-portable-${{ matrix.goarch }}
          path: dist/Presto-${{ env.VERSION }}-portable-windows-${{ matrix.goarch }}.zip

  # ── Linux: amd64 + arm64 (native runners, no cross-compilation) ──
  build-linux:
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-22.04
            typst_archive: typst-x86_64-unknown-linux-musl.tar.xz
            typst_sha256: "a6044cbad2a954deb921167e257e120ac0a16b20339ec01121194ff9d394996d"
            tinymist_archive: tinymist-x86_64-unknown-linux-musl.tar.gz
            tinymist_sha256: "6a7a2b525e9900f3718830f45a8337c5e35e55a54c8ccf7f84cd92209b924e9c"
          - goarch: arm64
            runner: ubuntu-22.04-arm
            typst_archive: typst-aarch64-unknown-linux-musl.tar.xz
            typst_sha256: "491b101aa40a3a7ea82a3f8a6232cabb4e6a7e233810082e5ac812d43fdcd47a"
            tinymist_archive: tinymist-aarch64-unknown-linux-musl.tar.gz
            tinymist_sha256: "7d85fcb2c60eaa7ed7160dd68f67917f462810a6f42b1940d297e603ddc1d2ab"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare portable template registry snapshot
        if: matrix.goarch == 'amd64'
        run: |
          git clone --depth=1 https://github.com/Presto-io/template-registry.git ../template-registry
          test -f ../template-registry/registry.json
          test -f ../template-registry/templates/gongwen/manifest.json
          test -f ../template-registry/templates/jiaoan-shicao/manifest.json
          test -f ../template-registry/templates/jiaoan-jihua/manifest.json

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-build
          path: cmd/presto-desktop/build/

      - name: Install native dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build Linux binary
        env:
          CGO_ENABLED: '1'
        run: |
          go build \
            -tags "desktop,production" \
            -ldflags "-s -w -X main.version=${{ env.VERSION }}" \
            -o "dist/Presto" \
            ./cmd/presto-desktop/

      - name: Download typst
        run: make _download-typst TYPST_ARCHIVE=${{ matrix.typst_archive }} TYPST_OUT=dist/typst TYPST_SHA256=${{ matrix.typst_sha256 }} REQUIRE_TYPST_SHA256=1

      - name: Download tinymist
        run: make _download-tinymist TINYMIST_ARCHIVE=${{ matrix.tinymist_archive }} TINYMIST_OUT=dist/tinymist TINYMIST_SHA256=${{ matrix.tinymist_sha256 }}

      - name: Package
        run: |
          cd dist
          tar czf "Presto-${{ env.VERSION }}-linux-${{ matrix.goarch }}.tar.gz" Presto typst tinymist

      - name: Clear embedded frontend for portable build
        if: matrix.goarch == 'amd64'
        run: rm -rf cmd/presto-desktop/build/*

      - name: Download portable frontend
        if: matrix.goarch == 'amd64'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-build-portable
          path: cmd/presto-desktop/build/

      - name: Install appimagetool
        if: matrix.goarch == 'amd64'
        run: |
          sudo curl -fsSL \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -o /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Build portable Linux AppImage
        if: matrix.goarch == 'amd64'
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: make dist-linux-portable-amd64 VERSION=${{ env.VERSION }} SKIP_FRONTEND=1 PORTABLE_LINUX_BUILD=native

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-linux-${{ matrix.goarch }}
          path: dist/Presto-${{ env.VERSION }}-linux-${{ matrix.goarch }}.tar.gz

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: matrix.goarch == 'amd64'
        with:
          name: dist-linux-portable-${{ matrix.goarch }}
          path: dist/Presto-${{ env.VERSION }}-portable-linux-${{ matrix.goarch }}.AppImage

  # ── Docker: per-arch native build ───────────────────────────
  build-docker:
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            typst_sha256: a6044cbad2a954deb921167e257e120ac0a16b20339ec01121194ff9d394996d
            tinymist_sha256: 6a7a2b525e9900f3718830f45a8337c5e35e55a54c8ccf7f84cd92209b924e9c
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            typst_sha256: 491b101aa40a3a7ea82a3f8a6232cabb4e6a7e233810082e5ac812d43fdcd47a
            tinymist_sha256: 7d85fcb2c60eaa7ed7160dd68f67917f462810a6f42b1940d297e603ddc1d2ab
    runs-on: ${{ matrix.runner }}
    env:
      REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/presto
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-build
          path: frontend/build/

      - name: Lowercase registry image
        run: echo "REGISTRY_IMAGE=${REGISTRY_IMAGE,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          # SEC-32: Pass Typst SHA256 checksums for build-time verification
          build-args: |
            TYPST_SHA256_AMD64=${{ matrix.typst_sha256 }}
            TYPST_SHA256_ARM64=${{ matrix.typst_sha256 }}
            TINYMIST_SHA256_AMD64=${{ matrix.tinymist_sha256 }}
            TINYMIST_SHA256_ARM64=${{ matrix.tinymist_sha256 }}
            SKIP_FRONTEND_BUILD=true
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-digest-${{ strategy.job-index }}
          path: /tmp/digests/*
          retention-days: 1

  # ── Docker: merge multi-arch manifest ──────────────────────
  merge-docker:
    needs: build-docker
    runs-on: ubuntu-latest
    env:
      REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/presto
    steps:
      - name: Lowercase registry image
        run: echo "REGISTRY_IMAGE=${REGISTRY_IMAGE,,}" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

  # ── GitHub Release ──────────────────────────────────────────
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/
          pattern: dist-*
          merge-multiple: true

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Guard release asset matrix
        run: |
          cd dist
          expected=(
            "Presto-${{ env.VERSION }}-macOS-arm64.dmg"
            "Presto-${{ env.VERSION }}-macOS-amd64.dmg"
            "Presto-${{ env.VERSION }}-windows-amd64-installer.exe"
            "Presto-${{ env.VERSION }}-windows-arm64-installer.exe"
            "Presto-${{ env.VERSION }}-linux-amd64.tar.gz"
            "Presto-${{ env.VERSION }}-linux-arm64.tar.gz"
            "Presto-${{ env.VERSION }}-portable-macOS-arm64.dmg"
            "Presto-${{ env.VERSION }}-portable-macOS-amd64.dmg"
            "Presto-${{ env.VERSION }}-portable-windows-amd64.zip"
            "Presto-${{ env.VERSION }}-portable-linux-amd64.AppImage"
          )
          for file in "${expected[@]}"; do
            test -f "$file" || {
              echo "::error::Missing release asset: $file"
              ls -la
              exit 1
            }
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum Presto-* > checksums.txt

      - name: Audit release asset matrix
        run: bash scripts/audit-release-assets.sh dist

      - name: Upload to Release
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ github.ref_name }}" == *-rc* ]] || [[ "${{ github.ref_name }}" == *-beta* ]] || [[ "${{ github.ref_name }}" == *-alpha* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "::error::Release ${{ github.ref_name }} already exists; refusing to overwrite published assets."
            exit 1
          else
            gh release create "${{ github.ref_name }}" \
              --title "Presto ${{ env.VERSION }}" \
              --generate-notes \
              $PRERELEASE_FLAG \
              dist/*
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
