name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.25.8'
  NODE_VERSION: '22'
  TYPST_VERSION: '0.14.2'

jobs:
  # ── Frontend: build once, share across platforms ──────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Embed into desktop build dir
        run: cp -r frontend/build/* cmd/presto-desktop/build/

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-build
          path: cmd/presto-desktop/build/
          retention-days: 1

  # ── macOS: arm64 + amd64 ─────────────────────────────────
  build-macos:
    needs: build-frontend
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm64
            make_target: dist-dmg-arm64
          - goarch: amd64
            make_target: dist-dmg-amd64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-build
          path: cmd/presto-desktop/build/

      - name: Import code signing certificate
        if: ${{ env.APPLE_CERTIFICATE_P12_BASE64 != '' }}
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f "$RUNNER_TEMP/certificate.p12"

          # Set keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Export identity for make
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "==> Certificate imported: $IDENTITY"

      - name: Warn if signing secrets not configured
        if: ${{ env.APPLE_CERTIFICATE_P12_BASE64 == '' }}
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
        run: echo "::warning::Code signing secrets not configured. Building with ad-hoc signature."

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build DMG
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        run: make ${{ matrix.make_target }} VERSION=${{ env.VERSION }} SKIP_FRONTEND=1

      - name: Notarize DMG
        if: ${{ env.CODESIGN_IDENTITY != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          DMG_FILE="dist/Presto-${{ env.VERSION }}-macOS-${{ matrix.goarch }}.dmg"
          make notarize DMG_PATH="$DMG_FILE"

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-macos-${{ matrix.goarch }}
          path: dist/Presto-${{ env.VERSION }}-macOS-${{ matrix.goarch }}.dmg

  # ── Windows: amd64 + arm64 ─────────────────────────────────
  build-windows:
    needs: build-frontend
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            cc: gcc
            typst_archive: typst-x86_64-pc-windows-msvc.zip
            typst_sha256: "51353994ac83218c3497052e89b2c432c53b9d4439cdc1b361e2ea4798ebfc13"
          - goarch: arm64
            cc: aarch64-w64-mingw32-gcc
            typst_archive: typst-aarch64-pc-windows-msvc.zip
            typst_sha256: "1c4aaa0de000ab1787dda354c34f4fa1fe3c2525d3d038e692a3d7daa333d551"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-build
          path: cmd/presto-desktop/build/

      - name: Add MSYS2 MinGW to PATH
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"

      - name: Cache llvm-mingw toolchain
        if: matrix.goarch == 'arm64'
        id: cache-llvm-mingw
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: llvm-mingw-20250114-ucrt-x86_64
          key: llvm-mingw-20250114-ucrt-x86_64

      - name: Setup llvm-mingw for arm64 cross-compilation
        if: matrix.goarch == 'arm64' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          LLVM_MINGW_URL="https://github.com/mstorsjo/llvm-mingw/releases/download/20250114/llvm-mingw-20250114-ucrt-x86_64.zip"
          curl -sL "$LLVM_MINGW_URL" -o llvm-mingw.zip
          # SEC-23: Verify integrity of cross-compilation toolchain
          # Update this hash when upgrading llvm-mingw version
          EXPECTED_HASH="9395d95c089611e6cd728c9a07219ffc5ac706e0c719833a2f7e64a706a81541"
          echo "${EXPECTED_HASH}  llvm-mingw.zip" | sha256sum -c - || {
            echo "ERROR: llvm-mingw checksum verification failed!"
            echo "If upgrading the version, update the EXPECTED_HASH in this workflow."
            exit 1
          }
          unzip -q llvm-mingw.zip
          rm llvm-mingw.zip

      - name: Add llvm-mingw to PATH
        if: matrix.goarch == 'arm64'
        run: echo "$PWD/llvm-mingw-20250114-ucrt-x86_64/bin" >> "$GITHUB_PATH"

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build Windows binary
        env:
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -tags "desktop,production" \
            -ldflags "-s -w -X main.version=${{ env.VERSION }} -H windowsgui" \
            -o "dist/Presto.exe" \
            ./cmd/presto-desktop/

      - name: Download typst
        run: |
          curl -sL "https://github.com/typst/typst/releases/download/v${{ env.TYPST_VERSION }}/${{ matrix.typst_archive }}" -o typst.zip
          # SEC-31: Verify typst binary integrity
          EXPECTED_HASH="${{ matrix.typst_sha256 }}"
          echo "${EXPECTED_HASH}  typst.zip" | sha256sum -c - || {
            echo "ERROR: typst checksum verification failed!"
            echo "If upgrading the version, update the typst_sha256 in the matrix."
            exit 1
          }
          unzip -qo typst.zip -d typst-tmp
          find typst-tmp -name 'typst.exe' | head -1 | xargs -I{} cp {} dist/typst.exe

      - name: Package
        run: |
          cd dist
          7z a "Presto-${{ env.VERSION }}-windows-${{ matrix.goarch }}.zip" Presto.exe typst.exe

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-windows-${{ matrix.goarch }}
          path: dist/Presto-${{ env.VERSION }}-windows-${{ matrix.goarch }}.zip

  # ── Linux: amd64 + arm64 (native runners, no cross-compilation) ──
  build-linux:
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-22.04
            typst_archive: typst-x86_64-unknown-linux-musl.tar.xz
          - goarch: arm64
            runner: ubuntu-22.04-arm
            typst_archive: typst-aarch64-unknown-linux-musl.tar.xz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-build
          path: cmd/presto-desktop/build/

      - name: Install native dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build Linux binary
        env:
          CGO_ENABLED: '1'
        run: |
          go build \
            -tags "desktop,production" \
            -ldflags "-s -w -X main.version=${{ env.VERSION }}" \
            -o "dist/Presto" \
            ./cmd/presto-desktop/

      - name: Download typst
        run: make _download-typst TYPST_ARCHIVE=${{ matrix.typst_archive }} TYPST_OUT=dist/typst

      - name: Package
        run: |
          cd dist
          tar czf "Presto-${{ env.VERSION }}-linux-${{ matrix.goarch }}.tar.gz" Presto typst

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-linux-${{ matrix.goarch }}
          path: dist/Presto-${{ env.VERSION }}-linux-${{ matrix.goarch }}.tar.gz

  # ── Docker: per-arch native build ───────────────────────────
  build-docker:
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            typst_sha256: a6044cbad2a954deb921167e257e120ac0a16b20339ec01121194ff9d394996d
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            typst_sha256: 491b101aa40a3a7ea82a3f8a6232cabb4e6a7e233810082e5ac812d43fdcd47a
    runs-on: ${{ matrix.runner }}
    env:
      REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/presto
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-build
          path: frontend/build/

      - name: Lowercase registry image
        run: echo "REGISTRY_IMAGE=${REGISTRY_IMAGE,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          # SEC-32: Pass Typst SHA256 checksums for build-time verification
          build-args: |
            TYPST_SHA256_AMD64=${{ matrix.typst_sha256 }}
            TYPST_SHA256_ARM64=${{ matrix.typst_sha256 }}
            SKIP_FRONTEND_BUILD=true
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docker-digest-${{ strategy.job-index }}
          path: /tmp/digests/*
          retention-days: 1

  # ── Docker: merge multi-arch manifest ──────────────────────
  merge-docker:
    needs: build-docker
    runs-on: ubuntu-latest
    env:
      REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/presto
    steps:
      - name: Lowercase registry image
        run: echo "REGISTRY_IMAGE=${REGISTRY_IMAGE,,}" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

  # ── GitHub Release ──────────────────────────────────────────
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/
          pattern: dist-*
          merge-multiple: true

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum Presto-* > checksums.txt

      - name: Upload to Release
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ github.ref_name }}" == *-rc* ]] || [[ "${{ github.ref_name }}" == *-beta* ]] || [[ "${{ github.ref_name }}" == *-alpha* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release upload "${{ github.ref_name }}" dist/* --clobber
          else
            gh release create "${{ github.ref_name }}" \
              --title "Presto ${{ env.VERSION }}" \
              --generate-notes \
              $PRERELEASE_FLAG \
              dist/*
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Homepage
        env:
          GH_TOKEN: ${{ secrets.HOMEPAGE_DISPATCH_TOKEN }}
        run: |
          gh api repos/Presto-io/Presto-Homepage/dispatches \
            -f event_type=release-published \
            -f 'client_payload[tag]=${{ github.ref_name }}'
