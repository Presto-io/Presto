name: Security Scan

on:
  schedule:
    - cron: '0 8 * * 1'  # 每周一 08:00 UTC
  pull_request:
    branches: [main]
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'frontend/package-lock.json'
  workflow_dispatch:

permissions: {}

jobs:
  go-vulncheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... 2>&1 | tee /tmp/govulncheck-output.txt
        continue-on-error: true

      - name: Check for vulnerabilities
        run: |
          if grep -q "Vulnerability" /tmp/govulncheck-output.txt; then
            echo "::error::Go dependency vulnerabilities found!"
            cat /tmp/govulncheck-output.txt
            exit 1
          fi

  npm-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Run npm audit
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high
