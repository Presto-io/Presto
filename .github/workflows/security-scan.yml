name: Security Scan

on:
  schedule:
    - cron: '0 8 * * 1'  # 每周一 08:00 UTC
  pull_request:
    branches: [main]
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'frontend/package-lock.json'
  workflow_dispatch:

permissions: {}

jobs:
  go-vulncheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... 2>&1 | tee /tmp/govulncheck-output.txt
        continue-on-error: true

      - name: Check for vulnerabilities
        run: |
          if grep -q "Vulnerability" /tmp/govulncheck-output.txt; then
            echo "::error::Go dependency vulnerabilities found!"
            cat /tmp/govulncheck-output.txt
            exit 1
          fi

  npm-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    # D-02: npm audit is informational only. Current high-severity findings
    # are follow-up items outside Phase 11 scope:
    # - dompurify <=3.3.3 (XSS, prototype pollution) — requires major upgrade
    # - picomatch 4.0.0-4.0.3 (ReDoS, method injection) — fixable via npm audit fix
    # - vite 7.0.0-7.3.1 (path traversal, file read, fs.deny bypass) — fixable via npm audit fix
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Run npm audit (informational)
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high || true
          echo "::warning::npm audit found vulnerabilities. See job output for details. These are tracked as follow-up items outside Phase 11."
