# docker-compose.tls.yml
# SEC-41: Caddy 自动 HTTPS 反向代理配置示例
# 用法: docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
#
# 前提：将 YOUR_DOMAIN 替换为实际域名，确保 DNS 已指向服务器。
# Caddy 会自动从 Let's Encrypt 获取 TLS 证书。

services:
  presto:
    ports: !override
      - "127.0.0.1:8080:8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - presto
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  caddy-data:
  caddy-config:
