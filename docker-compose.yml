services:
  presto:
    image: ghcr.io/presto-io/presto
    ports:
      - 127.0.0.1:8080:8080
    environment:
      PRESTO_INJECT_API_KEY: "true"
      PRESTO_CONFIG_DIR: /config
      PRESTO_DATA_DIR: /data
      PRESTO_CACHE_DIR: /cache
      PRESTO_LOG_DIR: /logs
      FONT_PATHS: /data/fonts:/usr/share/fonts
    volumes:
      - presto-config:/config
      - presto-data:/data
      - presto-cache:/cache
      - presto-logs:/logs
      - ./.presto-fonts:/data/fonts
    restart: unless-stopped

volumes:
  presto-config:
  presto-data:
  presto-cache:
  presto-logs:
