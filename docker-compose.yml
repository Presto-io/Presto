services:
  presto:
    build: .
    ports:
      - "127.0.0.1:8080:8080" # SEC-33: Bind to localhost only
    volumes:
      - presto-data:/home/presto/.presto
    restart: unless-stopped
    # SEC-42: Container security hardening
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

volumes:
  presto-data:
